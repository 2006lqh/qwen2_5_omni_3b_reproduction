run:
  id: qwen2_5_omni_3b_w4a8_librispeech_full2939
  output_dir: ${PROJECT_ROOT:-.}/../local_artifacts/raw_results/qwen2_5_omni_3b_w4a8/full_benchmark/openslr_librispeech_other_full2939
  result_dir: ${PROJECT_ROOT:-.}/results/full_benchmark

paths:
  root: ${PROJECT_ROOT:-.}
  model_dir: ${MODEL_DIR:-../local_artifacts/models/Qwen2.5-Omni-3B}
  masquant_dir: ${PROJECT_ROOT:-.}/third_party/EfficientAI/masquant
  local_calibration_jsonl: ${PROJECT_ROOT:-.}/third_party/EfficientAI/masquant/data/jsonls/omnibench.jsonl
  mas_parameters: ${MAS_PARAMS:-../local_artifacts/model_artifacts/qwen2_5_omni_3b_w4a8/mas_parameters/mas_parameters.pth}
  low_rank_adapters: ${LOW_RANK_ADAPTERS:-../local_artifacts/model_artifacts/qwen2_5_omni_3b_w4a8/cmc_adapters/cmc_full128_low_rank_adapters.pt}

quantization:
  method: MASQuant
  model: Qwen2.5-Omni-3B
  target_module: thinker
  dataset_type: text-audio-vision
  wbits: 4
  abits: 8
  nsamples: 128
  epochs: 2
  batch_size: 1
  rank_ratio: 0.05
  low_rank_adapter_ratio: 0.05
  inference_modes:
    baseline: merged_scales
    mas: split_scales

benchmark_env:
  librispeech: LIBRISPEECH_DIR
  wenetspeech: WENETSPEECH_DIR
  mmmu: MMMU_DIR
  ocrbench: OCRBENCH_DIR
  textvqa: TEXTVQA_DIR
  vizwiz: VIZWIZ_DIR
  scienceqa: SCIENCEQA_DIR
  omnibench: OMNIBENCH_DIR
