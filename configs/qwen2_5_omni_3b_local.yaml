model_path: ${MODEL_DIR:-/path/to/Qwen2.5-Omni-3B}
project_root: ${PROJECT_ROOT:-.}
source_repo: ${PROJECT_ROOT:-.}/third_party/EfficientAI
source_dir: ${PROJECT_ROOT:-.}/third_party/EfficientAI/masquant
source_status: submodule_with_local_patch
conda_env: ${MASQUANT_CONDA_ENV:-llm_quant}
output_dir: ${PROJECT_ROOT:-.}/outputs
log_dir: ${PROJECT_ROOT:-.}/logs
result_dir: ${PROJECT_ROOT:-.}/results
data_dir: ${PROJECT_ROOT:-.}/data

quantization:
  target: thinker
  method: masquant
  bits: W4A8
  calibration_size: 128

reproduction:
  stage: w4a8_proxy_and_benchmark_smoke
  model: Qwen2.5-Omni-3B
  paper: MASQuant
