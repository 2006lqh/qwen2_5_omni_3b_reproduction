dataset_path: lmms-lab/WenetSpeech
task: "wenet_speech_test_net"
test_split: test_net
output_type: generate_until
doc_to_visual: !function utils.wenet_speech_doc_to_audio
doc_to_text: !function utils.wenet_speech_doc_to_text
doc_to_target: "text"
generation_kwargs:
  max_new_tokens: 256
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""
    audio_column: "audio"
    source_text_column: "text"
process_results: !function utils.wenet_speech_process_results
metric_list:
  - metric: mer
    aggregation: mean
    higher_is_better: false
